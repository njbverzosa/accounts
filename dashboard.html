<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="header-left">
                <h1>📊 Dashboard</h1>
                <p>Welcome back, <span id="displayUsername"></span>!</p>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>

        <!-- Account Cards Grid -->
        <div class="accounts-section">
            <div class="section-header">
                <h2>👤 Account Holders</h2>
                <span class="section-badge">2 Users</span>
            </div>
            
            <div class="accounts-grid">
                <!-- Account 1: Admin -->
                <div class="account-card admin-card">
                    <div class="account-header">
                        <div class="account-avatar">👑</div>
                        <div class="account-badge">Admin</div>
                    </div>
                    <div class="account-body">
                        <div class="account-field">
                            <span class="field-label">👤 Username</span>
                            <span class="field-value" id="acc1Username">admin</span>
                        </div>
                        <div class="account-field password-field">
                            <span class="field-label">🔑 Password</span>
                            <div class="password-wrapper">
                                <span class="field-value password-value" id="acc1Password">nj@2024</span>
                                <button class="password-toggle" onclick="toggleAccountPassword('acc1Password')">👁️</button>
                            </div>
                        </div>
                    </div>
                    <div class="account-footer">
                        <span class="account-status online">🟢 Online</span>
                        <span class="account-role">Administrator</span>
                    </div>
                </div>

                <!-- Account 2: Demo -->
                <div class="account-card">
                    <div class="account-header">
                        <div class="account-avatar">👤</div>
                        <div class="account-badge user-badge">User</div>
                    </div>
                    <div class="account-body">
                        <div class="account-field">
                            <span class="field-label">👤 Username</span>
                            <span class="field-value" id="acc2Username">demo_user</span>
                        </div>
                        <div class="account-field password-field">
                            <span class="field-label">🔑 Password</span>
                            <div class="password-wrapper">
                                <span class="field-value password-value" id="acc2Password">demo123</span>
                                <button class="password-toggle" onclick="toggleAccountPassword('acc2Password')">👁️</button>
                            </div>
                        </div>
                    </div>
                    <div class="account-footer">
                        <span class="account-status offline">🔴 Offline</span>
                        <span class="account-role">Staff</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
